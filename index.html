<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
</head>
<body>
    <p>自動で移動します。移動しない場合は<a id="manual-link" href="#">こちら</a>をクリックしてください。</p>

    <script>
        // 飛ばしたい2人のインスタURL
        const urls = [
            "https://www.instagram.com/sakashu0212?igsh=OGlleTJjeWJvaWF2",
            "https://www.instagram.com/mako._.chii?igsh=c3M4ODAzN2czeHFv"
        ];

        // ランダムに1つ選択
        const target = urls[Math.floor(Math.random() * urls.length)];

        // 手動リンクのURLを書き換え
        document.getElementById('manual-link').href = target;

        // ランダムに選んだページへリダイレクト
        window.location.replace(target);
    </script>
</body>
</html>
